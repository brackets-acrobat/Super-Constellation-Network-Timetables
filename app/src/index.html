<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <title>Super Constellation — Horaires L-1049</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">✦</div>
      <div class="brand-text">
        <h1 id="brand-title">Super Constellation Network Timetables</h1>
      </div>
    </div>
    <div class="topbar-right">
      <div class="brand-era" id="brand-era">For the Red Wing Lockheed Super Constellation</div>
      <div class="lang-toggle" id="lang-toggle" role="group" aria-label="Language">
        <button type="button" class="lang-btn" data-lang="en">EN</button>
        <button type="button" class="lang-btn" data-lang="fr">FR</button>
      </div>
    </div>
  </header>

  <section class="selectors">
    <div class="field">
      <label for="sel-airline" id="lbl-airline">1 · Airline</label>
      <select id="sel-airline"></select>
    </div>
    <div class="field">
      <label for="sel-sheet" id="lbl-sheet">2 · Network / Sheet</label>
      <select id="sel-sheet" disabled></select>
    </div>
    <div class="field field-grow">
      <label for="sel-flight" id="lbl-flight">3 · Flight / Line</label>
      <select id="sel-flight" disabled></select>
    </div>
  </section>

  <main id="detail" class="detail">
    <div class="placeholder">
      <div class="placeholder-star">✦</div>
      <p id="placeholder-msg">Select an airline, a network and a flight to display the route details.</p>
    </div>
  </main>

  <footer class="footer">
    <span id="footer-meta"></span>
  </footer>

  <script src="renderer.js"></script>
</body>
</html>
